<!doctype html>
<html lang="fr">
<head>
  <title>406 — Équipement non homologué</title>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Squada+One&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #11111d;
      color: #ffffff;
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(250, 108, 0, 0.06) 0%, transparent 60%),
        radial-gradient(circle at 10% 90%, rgba(43, 127, 255, 0.04) 0%, transparent 40%);
      pointer-events: none;
    }

    .court-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
    }

    .court-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 340px;
      height: 340px;
      border: 2px solid #ffffff;
      border-radius: 50%;
    }

    .court-line-h {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: #ffffff;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      max-width: 480px;
    }

    .ball {
      font-size: 4rem;
      line-height: 1;
      filter: drop-shadow(0 8px 24px rgba(250, 108, 0, 0.4));
      animation: shake 0.6s ease-in-out infinite;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    .error-code {
      font-family: "Squada One", sans-serif;
      font-size: clamp(6rem, 20vw, 9rem);
      line-height: 1;
      color: #fa6c00;
      letter-spacing: -0.02em;
      text-shadow: 0 0 80px rgba(250, 108, 0, 0.25);
    }

    .badge {
      display: inline-block;
      background: rgba(250, 108, 0, 0.12);
      border: 1px solid rgba(250, 108, 0, 0.3);
      color: #fa6c00;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
    }

    h1 {
      font-family: "Squada One", sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      line-height: 1.2;
      color: #ffffff;
    }

    p {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.6;
    }

    .browsers {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-top: 0.25rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fa6c00;
      color: #ffffff;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 12px;
      transition: background 0.15s, transform 0.15s;
      margin-top: 0.5rem;
    }

    .btn:hover {
      background: #e05e00;
      transform: translateY(-1px);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>

  <div class="court-lines">
    <div class="court-circle"></div>
    <div class="court-line-h"></div>
  </div>

  <div class="content">
    <div class="ball">👟</div>
    <div class="error-code">406</div>
    <span class="badge">Équipement non homologué</span>
    <h1>Ton navigateur n'est pas admis sur le terrain</h1>
    <p>Mets à jour ton navigateur ou utilises-en un récent pour accéder au jeu.</p>
    <div class="browsers">
      <span title="Chrome">🌐</span>
      <span title="Firefox">🦊</span>
      <span title="Safari">🧭</span>
    </div>
    <a href="/" class="btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Retour à l'accueil
    </a>
  </div>

</body>
</html>
