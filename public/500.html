<!doctype html>
<html lang="fr">
<head>
  <title>500 — Temps mort</title>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Squada+One&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #11111d;
      color: #ffffff;
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(220, 38, 38, 0.08) 0%, transparent 60%),
        radial-gradient(circle at 10% 90%, rgba(43, 127, 255, 0.04) 0%, transparent 40%);
      pointer-events: none;
    }

    .court-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
    }

    .court-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 340px;
      height: 340px;
      border: 2px solid #ffffff;
      border-radius: 50%;
    }

    .court-line-h {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: #ffffff;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      max-width: 480px;
    }

    .ball-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .ball {
      font-size: 4rem;
      line-height: 1;
      filter: drop-shadow(0 4px 16px rgba(220, 38, 38, 0.4));
      animation: bounce 1.1s ease-in infinite;
      transform-origin: center bottom;
    }

    @keyframes bounce {
      0%   { transform: translateY(0) scaleX(1)   scaleY(1); animation-timing-function: ease-in; }
      45%  { transform: translateY(48px) scaleX(1) scaleY(1); animation-timing-function: linear; }
      50%  { transform: translateY(48px) scaleX(1.25) scaleY(0.7); animation-timing-function: ease-out; }
      55%  { transform: translateY(48px) scaleX(1)   scaleY(1); animation-timing-function: ease-out; }
      100% { transform: translateY(0) scaleX(1)   scaleY(1); animation-timing-function: ease-in; }
    }

    .ball-shadow {
      width: 40px;
      height: 8px;
      background: rgba(220, 38, 38, 0.25);
      border-radius: 50%;
      filter: blur(4px);
      animation: shadow 1.1s ease-in infinite;
      margin-top: -8px;
    }

    @keyframes shadow {
      0%   { transform: scaleX(0.4); opacity: 0.2; animation-timing-function: ease-in; }
      50%  { transform: scaleX(1.2); opacity: 0.7; animation-timing-function: ease-out; }
      100% { transform: scaleX(0.4); opacity: 0.2; animation-timing-function: ease-in; }
    }

    .error-code {
      font-family: "Squada One", sans-serif;
      font-size: clamp(6rem, 20vw, 9rem);
      line-height: 1;
      color: #ef4444;
      letter-spacing: -0.02em;
      text-shadow: 0 0 80px rgba(220, 38, 38, 0.3);
    }

    .badge {
      display: inline-block;
      background: rgba(220, 38, 38, 0.12);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #ef4444;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
    }

    h1 {
      font-family: "Squada One", sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      line-height: 1.2;
      color: #ffffff;
    }

    p {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ef4444;
      color: #ffffff;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 12px;
      transition: background 0.15s, transform 0.15s;
      margin-top: 0.5rem;
    }

    .btn:hover {
      background: #dc2626;
      transform: translateY(-1px);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>

  <div class="court-lines">
    <div class="court-circle"></div>
    <div class="court-line-h"></div>
  </div>

  <div class="content">
    <div class="ball-wrap">
      <div class="ball">🏀</div>
      <div class="ball-shadow"></div>
    </div>
    <div class="error-code">500</div>
    <span class="badge">Temps mort</span>
    <h1>Le serveur est sorti du jeu</h1>
    <p>Quelque chose a mal tourné de notre côté — le coach est en train de gérer.<br>Reviens dans quelques instants.</p>
    <a href="/" class="btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Retour à l'accueil
    </a>
  </div>

</body>
</html>
